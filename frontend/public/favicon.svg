<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Monochrome Gradients for the interlocking sharing loops -->
    <linearGradient id="leftGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer loop (left - creditor path) -->
  <path d="M 30,50 A 20,20 0 1,1 70,50 A 20,20 0 1,1 30,50" fill="none" stroke="url(#leftGrad)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Interlocking loop (right - debtor path) -->
  <path d="M 70,50 A 20,20 0 1,1 30,50" fill="none" stroke="url(#rightGrad)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" stroke-dasharray="35 150" />
  <path d="M 30,50 A 20,20 0 0,1 70,50" fill="none" stroke="url(#rightGrad)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" />

  <!-- Overlap Settlement Coin (monochrome center) -->
  <circle cx="50" cy="50" r="10" fill="#111827" stroke="#ffffff" stroke-width="1.5" filter="url(#shadow)" />
  <!-- Inner coin symbol (plus sign or split line) -->
  <path d="M 50,45 L 50,55 M 45,50 L 55,50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
</svg>